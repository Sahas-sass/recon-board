name: Recon Engine Autopilot

on:
  schedule:
    # Runs at 02:00 UTC (Around 7:30 AM in Sri Lanka) every day
    - cron: '0 2 * * *'
  # This line adds a button in GitHub so you can run it manually anytime
  workflow_dispatch: 

jobs:
  execute-recon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Command Center
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies & Headless Browser
        working-directory: ./scraper
        run: |
          python -m pip install --upgrade pip
          pip install playwright supabase python-dotenv beautifulsoup4
          playwright install --with-deps chromium

      - name: Deploy Recon Engine
        working-directory: ./scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python recon.py